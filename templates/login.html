{% extends "base.html" %}

{% block title %}
Login
{% endblock %}

{% block content %}

<h1>Login</h1>

<div class="card">

    <form method="POST">

        {{ form.hidden_tag() }}

        <p>
            {{ form.email.label }}<br><br>
            {{ form.email() }}
        </p>

        <br>

        <p>
            {{ form.password.label }}<br><br>
            {{ form.password() }}
        </p>

        <br>

        <p>
            {{ form.submit() }}
        </p>

    </form>

</div>

{% endblock %}
